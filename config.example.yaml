# GibRAM Configuration File
# Graph in-Buffer Retrieval & Associative Memory
# Copy this to config.yaml and customize

server:
  addr: ":6161"
  data_dir: "./data"
  vector_dim: 1536

session_store:
  # Default for exploration and fast RAG workflows.
  # Set to "durable" explicitly for restart/crash recovery.
  mode: "ephemeral"
  wal_dir: "./data/session_wal"
  wal_sync_policy: "every_write" # every_write, periodic, never
  wal_sync_interval: 1s
  snapshot_dir: "./data/session_snapshots"
  snapshot_interval: 5m
  snapshot_wal_size_bytes: 67108864

tls:
  # PRODUCTION: Use custom certificates (recommended)
  # Generate with: openssl req -x509 -newkey rsa:4096 -nodes \
  #   -keyout /etc/gibram/certs/server.key \
  #   -out /etc/gibram/certs/server.crt \
  #   -days 365 -subj "/CN=yourdomain.com"
  # Or use Let's Encrypt with certbot
  cert_file: ""  # Path to certificate file (e.g., /etc/gibram/certs/server.crt)
  key_file: ""   # Path to private key file (e.g., /etc/gibram/certs/server.key)
  
  # DEVELOPMENT ONLY: Auto-generate self-signed certificate.
  # Keep false for production; provide cert_file/key_file instead.
  auto_cert: false
  
  # INSECURE MODE (DEV ONLY): Start server with --insecure flag to disable TLS entirely
  # DO NOT USE IN PRODUCTION

auth:
  keys:
    # Admin key - full access.
    # Use bcrypt key_hash in production. Do not store plaintext API keys.
    - id: "admin"
      key_hash: "$2a$12$replace_with_bcrypt_hash_for_admin_key"
      permissions: ["admin"]
    
    # Application key - read/write access
    - id: "app-service"
      key_hash: "$2a$12$replace_with_bcrypt_hash_for_app_key"
      permissions: ["write"]
    
    # Read-only key
    - id: "query-service"
      key_hash: "$2a$12$replace_with_bcrypt_hash_for_query_key"
      permissions: ["read"]

security:
  # Max frame size (4MB default)
  max_frame_size: 4194304
  max_content_bytes: 1048576
  max_memory_bytes: 0
  max_session_documents: 0
  max_session_entities: 0
  max_session_relationships: 0
  
  # Rate limiting per API key
  rate_limit: 1000  # requests per second
  rate_burst: 100   # burst allowance
  
  # Connection timeouts
  idle_timeout: 300s      # idle connection timeout
  unauth_timeout: 10s     # timeout for unauthenticated connections
  max_conns_per_ip: 50    # max connections per IP

logging:
  level: "info"    # debug, info, warn, error
  format: "text"   # json, text
  output: "stdout" # stdout, file
  file: ""         # log file path if output=file
